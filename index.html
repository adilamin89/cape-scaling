/* ── CANVAS: PHASE DIAGRAM ────────────────────────────── */
function PhaseChart({uN,uT}){
  const ref=useRef(null);
  const draw=()=>{
    const cv=ref.current; if(!cv)return;
    const dpr=window.devicePixelRatio||1;
    const W=cv.parentElement.clientWidth||580, H=280;
    cv.width=W*dpr; cv.height=H*dpr;
    const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
    const p={l:44,r:14,t:16,b:44};
    const lMn=7.8,lMx=11.5,tMn=26,tMx=82;
    const X=l=>p.l+(l-lMn)/(lMx-lMn)*(W-p.l-p.r);
    const Y=t=>p.t+(tMx-t)/(tMx-tMn)*(H-p.t-p.b);
    ctx.clearRect(0,0,W,H);
    const ncX=X(Math.log10(NC));
    ctx.fillStyle="rgba(220,38,38,0.045)"; ctx.fillRect(p.l,p.t,ncX-p.l,H-p.t-p.b);
    ctx.fillStyle="rgba(16,185,129,0.045)"; ctx.fillRect(ncX,p.t,W-p.r-ncX,H-p.t-p.b);
    ctx.strokeStyle="#30363d"; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(ncX,p.t); ctx.lineTo(ncX,H-p.b); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle="#c9d1d9"; ctx.font="11px Inter,sans-serif"; ctx.textAlign="center";
    for(let i=8;i<=11;i++){const x=X(i); ctx.fillText("10^"+i,x,H-22);}
    ctx.textAlign="left";
    for(let t=30;t<=80;t+=10){const y=Y(t); ctx.fillText(t+"%",8,y+4);}
    ctx.strokeStyle="#30363d"; ctx.lineWidth=0.8;
    for(let i=8;i<=11;i++){const x=X(i); ctx.beginPath(); ctx.moveTo(x,p.t); ctx.lineTo(x,H-p.b); ctx.stroke();}
    for(let t=30;t<=80;t+=10){const y=Y(t); ctx.beginPath(); ctx.moveTo(p.l,y); ctx.lineTo(W-p.r,y); ctx.stroke();}
    MODELS.forEach(m=>{const x=X(Math.log10(m.N)),y=Y(m.tqa); ctx.fillStyle=FC[m.f]; ctx.beginPath(); ctx.arc(x,y,4,0,Math.PI*2); ctx.fill();});
    if(uN&&uT){const uNv=parseFloat(uN),uTv=parseFloat(uT); if(!isNaN(uNv)&&!isNaN(uTv)&&uNv>0){const x=X(Math.log10(uNv)),y=Y(uTv); ctx.fillStyle="#FFD700"; ctx.strokeStyle="#FFD700"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2); ctx.stroke();}}
  };
  useEffect(()=>{draw();window.addEventListener("resize",draw);return()=>window.removeEventListener("resize",draw);},[uN,uT]);
  return React.createElement("canvas",{ref:ref,style:{width:"100%",height:"280px"}});
}

    const sMn=70,sMx=82,gMn=75,gMx=95;
    const X=s=>p.l+(s-sMn)/(sMx-sMn)*(W-p.l-p.r);
    const Y=g=>p.t+(gMx-g)/(gMx-gMn)*(H-p.t-p.b);
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle="#30363d"; ctx.lineWidth=0.8; ctx.fillStyle="#c9d1d9"; ctx.font="10px Inter,sans-serif";
    for(let s=71;s<=81;s+=2){const x=X(s); ctx.beginPath(); ctx.moveTo(x,p.t); ctx.lineTo(x,H-p.b); ctx.stroke(); ctx.textAlign="center"; ctx.fillText(s,x,H-32);}
    for(let g=80;g<=94;g+=5){const y=Y(g); ctx.beginPath(); ctx.moveTo(p.l,y); ctx.lineTo(W-p.r,y); ctx.stroke(); ctx.textAlign="right"; ctx.fillText(g,p.l-8,y+3);}

  };
  useEffect(()=>{draw();window.addEventListener("resize",draw);return()=>window.removeEventListener("resize",draw);},[]);
  return React.createElement("canvas",{ref:ref,style:{width:"100%",height:"300px"}});
}

    const p={l:50,r:20,t:20,b:50};
    const nMn=7,nMx=11.5,aMn=0,aMx=90;
    const X=n=>p.l+(n-nMn)/(nMx-nMn)*(W-p.l-p.r);
    const Y=a=>p.t+(aMx-a)/(aMx-aMn)*(H-p.t-p.b);
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle="#30363d"; ctx.lineWidth=0.8; ctx.fillStyle="#8b949e"; ctx.font="9px Inter,sans-serif";
    for(let n=8;n<=11;n++){const x=X(n); ctx.beginPath(); ctx.moveTo(x,p.t); ctx.lineTo(x,H-p.b); ctx.stroke(); ctx.textAlign="center"; ctx.fillText("10^"+n,x,H-32);}
    for(let a=0;a<=90;a+=30){const y=Y(a); ctx.beginPath(); ctx.moveTo(p.l,y); ctx.lineTo(W-p.r,y); ctx.stroke(); ctx.textAlign="right"; ctx.fillText(a+"°",p.l-8,y+3);}
    const ncX=X(Math.log10(NC));
    ctx.strokeStyle="#FFD700"; ctx.lineWidth=2; ctx.setLineDash([4,4]);
    ctx.beginPath(); ctx.moveTo(ncX,p.t); ctx.lineTo(ncX,H-p.b); ctx.stroke(); ctx.setLineDash([]);
    ctx.strokeStyle="#6ee7b7"; ctx.lineWidth=2.5;
    ctx.beginPath();
    for(let n=7;n<=11.5;n+=0.1){const x=X(n),a_val=n<9?10:(n>10.5?38.8:20+(n-9)*10);ctx.lineTo(x,Y(a_val));}
    ctx.stroke();
  };
  useEffect(()=>{draw();window.addEventListener("resize",draw);return()=>window.removeEventListener("resize",draw);},[]);
  return React.createElement("canvas",{ref:ref,style:{width:"100%",height:"280px"}});
}

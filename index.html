<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect,useCallback}=React;
const h=React.createElement;

/* ── CORE CONSTANTS ──────────────────────────────────── */
const NC=3.5e9, GA=0.629, GB=-5.886;
const UNIV=l=>4.532*l*l-86.42*l+447.8;
const g12=N=>GA*Math.log10(N)+GB;
const regime=N=>{const g=g12(N);
  if(g<-0.5)return{l:"DEEP TAX",c:"#f87171",bg:"rgba(248,113,113,0.06)"};
  if(g<0)return{l:"TAX",c:"#fb923c",bg:"rgba(251,146,60,0.06)"};
  if(g<0.5)return{l:"TRANSITION",c:"#fbbf24",bg:"rgba(251,191,36,0.06)"};
  if(g<1.5)return{l:"BONUS",c:"#6ee7b7",bg:"rgba(110,231,183,0.06)"};
  return{l:"DEEP BONUS",c:"#34d399",bg:"rgba(52,211,153,0.06)"};
};

  {n:"Pythia-160M",N:.16e9,hs:31.4,tqa:44.3,f:"Pythia"},

  {n:"Llama-1-65B",N:65e9,hs:84.2,tqa:41.7,f:"Llama-1"},

  {n:"Llama-3-8B",N:8e9,hs:82,tqa:43.9,f:"Llama-3"},
  {n:"Llama-3-70B",N:70e9,hs:88,tqa:44.9,f:"Llama-3"},
  {n:"Llama-3.1-405B",N:405e9,hs:93.1,tqa:51.2,f:"Llama-3"},
  {n:"Mistral-7B",N:7e9,hs:81,tqa:42.2,f:"Mistral"},
  {n:"Falcon-7B",N:7e9,hs:78.1,tqa:28,f:"Falcon"},
  {n:"Falcon-40B",N:40e9,hs:85.3,tqa:39.7,f:"Falcon"},
  {n:"DeepSeek-V3",N:671e9,hs:88.9,tqa:59.1,f:"DeepSeek"},
];
const FC={Pythia:"#3b82f6",OLMo:"#10b981","Llama-1":"#6366f1","Llama-2":"#a855f7",
  Phi:"#ef4444",Mistral:"#eab308","Llama-3":"#f59e0b",Falcon:"#14b8a6",DeepSeek:"#e11d48"};

/* ── FRONTIER DATA (16 models) ───────────────────────── */
const FR=[
  {n:"Claude Haiku 4.5",swe:null,gpqa:null,arc:null,fam:"Anthropic",sz:"~4B",note:"No public evals"},
  {n:"Claude Sonnet 4.5",swe:77.2,gpqa:83.4,arc:null,fam:"Anthropic",sz:"~70B",note:""},
  {n:"Claude Sonnet 4.6",swe:79.6,gpqa:89.9,arc:58.3,fam:"Anthropic",sz:"~70B",note:"In paper"},
  {n:"Claude Opus 4.6",swe:80.8,gpqa:91.3,arc:68.8,fam:"Anthropic",sz:"~500B",note:"In paper"},
  {n:"GPT-5.2 Pro",swe:80.0,gpqa:93.2,arc:null,fam:"OpenAI",sz:"~1T",note:""},
  {n:"GPT-5.4",swe:null,gpqa:null,arc:null,fam:"OpenAI",sz:"~1T",note:"Mar 2026"},
  {n:"Gemini 2.5 Pro",swe:63.8,gpqa:84.0,arc:null,fam:"Google",sz:"~500B",note:"In paper"},
  {n:"Gemini 3 Flash",swe:78.0,gpqa:90.4,arc:null,fam:"Google",sz:"~500B",note:""},
  {n:"Gemini 3 Pro",swe:76.2,gpqa:91.9,arc:null,fam:"Google",sz:"~1T",note:""},
  {n:"Gemini 3.1 Pro",swe:80.6,gpqa:94.3,arc:null,fam:"Google",sz:"~1T",note:""},
  {n:"DeepSeek V3.2",swe:74.4,gpqa:79.9,arc:null,fam:"DeepSeek",sz:"671B",note:""},
  {n:"Kimi K2",swe:65.8,gpqa:null,arc:null,fam:"Kimi",sz:"1T",note:"Open weights"},
  {n:"Kimi K2.5",swe:80.2,gpqa:85.2,arc:null,fam:"Kimi",sz:"1T",note:""},
  {n:"MiniMax M2.5",swe:80.2,gpqa:null,arc:null,fam:"MiniMax",sz:"~500B",note:"Open weights"},
  {n:"Qwen3.5-72B",swe:73.4,gpqa:83.7,arc:null,fam:"Alibaba",sz:"72B",note:"Open weights"},
  {n:"GLM-5",swe:null,gpqa:null,arc:null,fam:"Zhipu",sz:"~500B",note:"Arena top open"},
];
const FFC={Anthropic:"#CC785C",OpenAI:"#10a37f",Google:"#4285f4",DeepSeek:"#1e40af",
  Kimi:"#7c3aed",MiniMax:"#f97316",Alibaba:"#f59e0b",Zhipu:"#8b5cf6"};

/* ── CORRELATION / h(D) / Nc2 DATA ───────────────────── */
const CE=[
  {scale:"Pythia only (70M-12B)",corr:-0.989,deff:1.047,n:8},
  {scale:"Extended (70M-40B)",corr:-0.481,deff:1.625,n:18},
  {scale:"Frontier (all N)",corr:0.082,deff:1.987,n:26},
];
const HD=[
  {name:"Phi-4",lab:"Microsoft",h:23,N:14,note:"Curated/synthetic data"},
  {name:"Phi-3.5-MoE",lab:"Microsoft",h:15.3,N:42,note:"Curated"},
  {name:"DeepSeek-V3",lab:"DeepSeek",h:15.1,N:671,note:"R1 distillation"},
  {name:"Phi-3-mini",lab:"Microsoft",h:11.6,N:3.8,note:"Curated"},
  {name:"Llama-3.1-405B",lab:"Meta",h:5.1,N:405,note:"Scale helps"},
  {name:"Mistral-7B",lab:"Mistral",h:1.7,N:7,note:"Instruction tuning"},
  {name:"Llama-2-70B",lab:"Meta",h:1.6,N:70,note:"RLHF baseline"},
  {name:"Llama-3-70B",lab:"Meta",h:1.3,N:70,note:""},
  {name:"Llama-1-65B",lab:"Meta",h:-0.2,N:65,note:"Pre-RLHF era"},
  {name:"Falcon-40B",lab:"Tii",h:-2.7,N:40,note:"Minimal alignment"},
];
const NC2=[
  {pair:"SWE-bench vs Refusal Rate",desc:"Agentic capability vs explicit refusal. Predicts Nc2 in heavy RLHF regimes.",c:"#E91E63"},
  {pair:"ARC-AGI-2 vs Adversarial TQA",desc:"Reasoning depth vs adversarial truthfulness at 100B+ with safety finetuning.",c:"#FF5722"},
  {pair:"TerminalBench vs Sycophancy",desc:"Autonomous action vs tendency to agree. Requires new benchmark data.",c:"#2196F3"},
  {pair:"Planning Depth vs Safety",desc:"Agentic planning vs safety guardrails. Predicted Nc2 ~ 5-30T params.",c:"#9C27B0"},
];

/* ── COMPUTED STATS ──────────────────────────────────── */
const frWithBoth=FR.filter(m=>m.swe!==null&&m.gpqa!==null);
const frCoverage=Math.round(frWithBoth.length/FR.length*100);
const families=[...new Set(M.map(m=>m.f))];

/* ── CANVAS: MAIN PHASE CHART ────────────────────────── */
function PhaseChart({uN,uT,wd}){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current; if(!cv)return;
    const draw=()=>{
      const dpr=window.devicePixelRatio||1;
      const W=cv.parentElement.clientWidth||600,H=340;
      cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+"px";cv.style.height=H+"px";
      const c=cv.getContext("2d");c.scale(dpr,dpr);
      const p={l:54,r:16,t:20,b:56};
      const nL=7,nH=11.8,tL=22,tH=72;
      const X=n=>p.l+(n-nL)/(nH-nL)*(W-p.l-p.r);
      const Y=t=>p.t+(tH-t)/(tH-tL)*(H-p.t-p.b);
      c.clearRect(0,0,W,H);
      /* regime shading */
      const ncX=X(Math.log10(NC));
      c.fillStyle="rgba(248,113,113,0.035)";c.fillRect(p.l,p.t,ncX-p.l,H-p.t-p.b);
      c.fillStyle="rgba(110,231,183,0.035)";c.fillRect(ncX,p.t,W-p.r-ncX,H-p.t-p.b);
      /* grid */
      c.strokeStyle="#1c2128";c.lineWidth=1;
      for(let i=8;i<=11;i++){const x=X(i);c.beginPath();c.moveTo(x,p.t);c.lineTo(x,H-p.b);c.stroke();}
      for(let t=30;t<=70;t+=10){const y=Y(t);c.beginPath();c.moveTo(p.l,y);c.lineTo(W-p.r,y);c.stroke();}
      /* Nc line */
      c.strokeStyle="#FFD700";c.lineWidth=1.5;c.setLineDash([6,4]);
      c.beginPath();c.moveTo(ncX,p.t);c.lineTo(ncX,H-p.b);c.stroke();c.setLineDash([]);
      c.fillStyle="#FFD700";c.font="bold 11px Inter";c.textAlign="center";
      c.fillText("Nc = 3.5B",ncX,p.t-6);
      /* UNIV fit line */
      c.strokeStyle="rgba(96,165,250,0.4)";c.lineWidth=2;c.setLineDash([3,3]);
      c.beginPath();
      for(let n=7.5;n<=11.5;n+=0.05){const x=X(n),tv=UNIV(n);if(tv>=tL&&tv<=tH){c.lineTo(x,Y(tv));}}
      c.stroke();c.setLineDash([]);
      /* axis labels */
      c.fillStyle="#8b949e";c.font="11px Inter";c.textAlign="center";
      for(let i=8;i<=11;i++){c.fillText(i===8?"100M":i===9?"1B":i===10?"10B":"100B",X(i),H-p.b+18);}
      c.fillStyle="#6b7280";c.font="11px Inter";c.fillText("Model Size (parameters)",W/2,H-6);
      c.textAlign="right";
      for(let t=30;t<=70;t+=10){c.fillStyle="#8b949e";c.fillText(t+"%",p.l-6,Y(t)+4);}
      c.save();c.translate(12,H/2);c.rotate(-Math.PI/2);c.fillStyle="#6b7280";c.textAlign="center";
      c.fillText("TruthfulQA (%)",0,0);c.restore();
      /* data points */
      M.forEach(m=>{
        const x=X(Math.log10(m.N)),y=Y(m.tqa);
        c.fillStyle=FC[m.f];
        if(m.f==="Phi"){c.save();c.translate(x,y);c.rotate(Math.PI/4);c.fillRect(-5,-5,10,10);c.restore();}
        else{c.beginPath();c.arc(x,y,4,0,Math.PI*2);c.fill();}
      });
      /* user point */
      if(uN&&uT){const uNv=parseFloat(uN),uTv=parseFloat(uT);
        if(!isNaN(uNv)&&!isNaN(uTv)&&uNv>0){const x=X(Math.log10(uNv)),y=Y(uTv);
          c.strokeStyle="#FFD700";c.lineWidth=2;c.beginPath();c.arc(x,y,7,0,Math.PI*2);c.stroke();
          c.fillStyle="#FFD700";c.beginPath();c.arc(x,y,3,0,Math.PI*2);c.fill();
        }
      }
      /* regime labels */
      c.font="bold 10px Inter";c.globalAlpha=0.5;
      c.fillStyle="#f87171";c.textAlign="center";c.fillText("ALIGNMENT TAX",(p.l+ncX)/2,p.t+14);
      c.fillStyle="#6ee7b7";c.fillText("ALIGNMENT BONUS",(ncX+W-p.r)/2,p.t+14);
      c.globalAlpha=1;
    };
    draw();window.addEventListener("resize",draw);return()=>window.removeEventListener("resize",draw);
  },[uN,uT]);
  return h("canvas",{ref:ref,style:{width:"100%",height:"340px",display:"block"}});
}

/* ── CANVAS: FRONTIER SWE vs GPQA ────────────────────── */
function FrontierChart(){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    const draw=()=>{
      const dpr=window.devicePixelRatio||1;
      const W=cv.parentElement.clientWidth||600,H=340;
      cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+"px";cv.style.height=H+"px";
      const c=cv.getContext("2d");c.scale(dpr,dpr);
      const p={l:60,r:24,t:24,b:56};
      const sL=60,sH=84,gL=78,gH=96;
      const X=s=>p.l+(s-sL)/(sH-sL)*(W-p.l-p.r);
      const Y=g=>p.t+(gH-g)/(gH-gL)*(H-p.t-p.b);
      c.clearRect(0,0,W,H);
      c.strokeStyle="#1c2128";c.lineWidth=1;
      for(let s=65;s<=80;s+=5){const x=X(s);c.beginPath();c.moveTo(x,p.t);c.lineTo(x,H-p.b);c.stroke();}
      for(let g=80;g<=95;g+=5){const y=Y(g);c.beginPath();c.moveTo(p.l,y);c.lineTo(W-p.r,y);c.stroke();}
      c.fillStyle="#8b949e";c.font="11px Inter";c.textAlign="center";
      for(let s=65;s<=80;s+=5){c.fillText(s+"%",X(s),H-p.b+18);}
      c.fillStyle="#6b7280";c.fillText("SWE-bench Verified (%)",W/2,H-6);
      c.textAlign="right";
      for(let g=80;g<=95;g+=5){c.fillText(g+"%",p.l-8,Y(g)+4);}
      c.save();c.translate(14,H/2);c.rotate(-Math.PI/2);c.fillStyle="#6b7280";c.textAlign="center";
      c.fillText("GPQA Diamond (%)",0,0);c.restore();
      /* points with labels */
      const pts=FR.filter(m=>m.swe!==null&&m.gpqa!==null);
      pts.forEach(m=>{
        const x=X(m.swe),y=Y(m.gpqa);
        c.fillStyle=FFC[m.fam]||"#888";c.beginPath();c.arc(x,y,6,0,Math.PI*2);c.fill();
        c.fillStyle="#c9d1d9";c.font="9px Inter";c.textAlign="left";
        const short=m.n.replace("Claude ","").replace("Gemini ","G").replace("DeepSeek ","DS ");
        c.fillText(short,x+9,y+3);
      });
      /* cooperative label */
      c.fillStyle="rgba(110,231,183,0.6)";c.font="bold 11px Inter";c.textAlign="right";
      c.fillText("r = +0.55 (cooperative)",W-p.r,p.t+14);
    };
    draw();window.addEventListener("resize",draw);return()=>window.removeEventListener("resize",draw);
  },[]);
  return h("canvas",{ref:ref,style:{width:"100%",height:"340px",display:"block"}});
}

/* ── CANVAS: CORRELATION FLIP ────────────────────────── */
function CorrChart(){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    const draw=()=>{
      const dpr=window.devicePixelRatio||1;
      const W=cv.parentElement.clientWidth||400,H=220;
      cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+"px";cv.style.height=H+"px";
      const c=cv.getContext("2d");c.scale(dpr,dpr);
      const p={l:50,r:20,t:20,b:40};
      const yL=-1.1,yH=0.5;
      const X=i=>p.l+i/(CE.length-1)*(W-p.l-p.r);
      const Y=v=>p.t+(yH-v)/(yH-yL)*(H-p.t-p.b);
      c.clearRect(0,0,W,H);
      c.strokeStyle="#1c2128";c.lineWidth=1;
      for(let y=-1;y<=0.5;y+=0.5){const yy=Y(y);c.beginPath();c.moveTo(p.l,yy);c.lineTo(W-p.r,yy);c.stroke();}
      c.strokeStyle="#FFD700";c.lineWidth=1.5;c.setLineDash([4,3]);
      c.beginPath();c.moveTo(p.l,Y(0));c.lineTo(W-p.r,Y(0));c.stroke();c.setLineDash([]);
      c.strokeStyle="#3b82f6";c.lineWidth=2.5;c.beginPath();
      CE.forEach((d,i)=>{if(i===0)c.moveTo(X(i),Y(d.corr));else c.lineTo(X(i),Y(d.corr));});
      c.stroke();
      CE.forEach((d,i)=>{
        const x=X(i),y=Y(d.corr);
        c.fillStyle=d.corr<0?"#f87171":"#4CAF50";c.beginPath();c.arc(x,y,6,0,Math.PI*2);c.fill();
        c.fillStyle="#c9d1d9";c.font="bold 12px Inter";c.textAlign="center";c.fillText(d.corr.toFixed(2),x,y-12);
        c.fillStyle="#8b949e";c.font="10px Inter";c.fillText(i===0?"Pythia":i===1?"Extended":"Frontier",x,H-p.b+16);
      });
      c.textAlign="right";c.fillStyle="#8b949e";c.font="10px Inter";
      for(let y=-1;y<=0;y+=0.5){c.fillText(y.toFixed(1),p.l-6,Y(y)+4);}
    };
    draw();window.addEventListener("resize",draw);return()=>window.removeEventListener("resize",draw);
  },[]);
  return h("canvas",{ref:ref,style:{width:"100%",height:"220px",display:"block"}});
}

/* ── CANVAS: d_eff EXPANSION ─────────────────────────── */
function DeffExpChart(){
  const ref=useRef(null);
  useEffect(()=>{
    const cv=ref.current;if(!cv)return;
    const draw=()=>{
      const dpr=window.devicePixelRatio||1;
      const W=cv.parentElement.clientWidth||400,H=220;
      cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+"px";cv.style.height=H+"px";
      const c=cv.getContext("2d");c.scale(dpr,dpr);
      const p={l:50,r:20,t:20,b:40};
      const yL=0.8,yH=2.2;
      const X=i=>p.l+i/(CE.length-1)*(W-p.l-p.r);
      const Y=v=>p.t+(yH-v)/(yH-yL)*(H-p.t-p.b);
      c.clearRect(0,0,W,H);
      c.strokeStyle="#1c2128";c.lineWidth=1;
      for(let y=1;y<=2;y+=0.5){const yy=Y(y);c.beginPath();c.moveTo(p.l,yy);c.lineTo(W-p.r,yy);c.stroke();}
      c.strokeStyle="#FFD700";c.lineWidth=1.5;c.setLineDash([4,3]);
      c.beginPath();c.moveTo(p.l,Y(2.0));c.lineTo(W-p.r,Y(2.0));c.stroke();c.setLineDash([]);
      c.strokeStyle="#FF5722";c.lineWidth=2.5;c.beginPath();
      CE.forEach((d,i)=>{if(i===0)c.moveTo(X(i),Y(d.deff));else c.lineTo(X(i),Y(d.deff));});
      c.stroke();
      CE.forEach((d,i)=>{
        const x=X(i),y=Y(d.deff);
        c.fillStyle="#FF5722";c.beginPath();c.arc(x,y,6,0,Math.PI*2);c.fill();
        c.fillStyle="#c9d1d9";c.font="bold 12px Inter";c.textAlign="center";c.fillText(d.deff.toFixed(2),x,y-12);
        c.fillStyle="#8b949e";c.font="10px Inter";c.fillText(i===0?"Pythia":i===1?"Extended":"Frontier",x,H-p.b+16);
      });
      c.textAlign="right";c.fillStyle="#8b949e";c.font="10px Inter";
      for(let y=1;y<=2;y+=0.5){c.fillText(y.toFixed(1),p.l-6,Y(y)+4);}
      c.fillStyle="#FFD700";c.textAlign="left";c.font="10px Inter";c.fillText("d=2 (new dimension)",p.l+4,Y(2)-6);
    };
    draw();window.addEventListener("resize",draw);return()=>window.removeEventListener("resize",draw);
  },[]);
  return h("canvas",{ref:ref,style:{width:"100%",height:"220px",display:"block"}});
}

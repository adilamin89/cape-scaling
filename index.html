<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useRef,useEffect}=React;

/* ── DATA ─────────────────────────────────────────────── */
const NC=3.5e9,GA=0.629,GB=-5.886;
const UNIV=(l)=>4.532*l*l-86.42*l+447.8;
const g12=(N)=>GA*Math.log10(N)+GB;
const regime=(N)=>{const g=g12(N);
  if(g<-0.5)return{l:"DEEP TAX",  c:"#f87171",dim:"rgba(220,38,38,0.08)"};
  if(g<0)   return{l:"TAX",       c:"#fb923c",dim:"rgba(249,115,22,0.06)"};
  if(g<0.5) return{l:"TRANSITION",c:"#fbbf24",dim:"rgba(251,191,36,0.06)"};
  if(g<1.5) return{l:"BONUS",     c:"#6ee7b7",dim:"rgba(22,163,74,0.06)"};
  return          {l:"DEEP BONUS",c:"#34d399",dim:"rgba(16,185,129,0.06)"};
};

const MODELS=[
  {n:"Pythia-70M", N:7e7,  tqa:47.6,f:"Pythia"},  {n:"Pythia-160M",N:1.6e8,tqa:45.3,f:"Pythia"},
  {n:"Pythia-410M",N:4.1e8,tqa:40.3,f:"Pythia"},  {n:"Pythia-1B",  N:1e9,  tqa:38.7,f:"Pythia"},
  {n:"Pythia-1.4B",N:1.4e9,tqa:38.7,f:"Pythia"},  {n:"Pythia-2.8B",N:2.8e9,tqa:35.6,f:"Pythia"},
  {n:"Pythia-6.9B",N:6.9e9,tqa:32.8,f:"Pythia"},  {n:"Pythia-12B", N:1.2e10,tqa:32.5,f:"Pythia"},
  {n:"OLMo-1B",   N:1e9,  tqa:36.0,f:"OLMo"},    {n:"OLMo-7B",   N:7e9,  tqa:36.0,f:"OLMo"},
  {n:"Phi-2.7B",  N:2.7e9,tqa:44.0,f:"Phi"},      {n:"Phi-3-mini",N:3.8e9,tqa:65.0,f:"Phi"},
  {n:"Phi-3-med", N:1.4e10,tqa:76.0,f:"Phi"},      {n:"Llama-1-7B",N:7e9, tqa:34.0,f:"Llama-1"},
  {n:"Llama-1-13B",N:1.3e10,tqa:40.0,f:"Llama-1"},{n:"Llama-1-65B",N:6.5e10,tqa:43.0,f:"Llama-1"},
  {n:"Llama-2-7B",N:7e9,  tqa:39.0,f:"Llama-2"}, {n:"Llama-2-13B",N:1.3e10,tqa:37.4,f:"Llama-2"},
  {n:"Llama-2-70B",N:7e10,tqa:44.9,f:"Llama-2"}, {n:"Llama-3-8B",N:8e9,  tqa:44.0,f:"Llama-3"},
  {n:"Llama-3-70B",N:7e10,tqa:52.0,f:"Llama-3"}, {n:"Mistral-7B",N:7e9,  tqa:42.0,f:"Mistral"},
  {n:"Gemma-7B",  N:7e9,  tqa:45.0,f:"Gemma"},    {n:"MPT-7B",    N:7e9,  tqa:33.0,f:"MPT"},
  {n:"Falcon-7B",   N:7e9,  tqa:35.0,f:"Falcon"},   {n:"Falcon-40B",  N:4e10, tqa:42.0,f:"Falcon"},
  {n:"Phi-3.5-MoE", N:4.2e10,tqa:72.0,f:"Phi"},      {n:"Phi-4",       N:1.4e10,tqa:73.0,f:"Phi"},
  {n:"Llama-3.1-8B",N:8e9,  tqa:44.0,f:"Llama-3"},   {n:"Llama-3.1-70B",N:7e10, tqa:54.0,f:"Llama-3"},
  {n:"Llama-3.1-405B",N:4.05e11,tqa:57.0,f:"Llama-3"},{n:"Gemma-2-9B",  N:9e9,  tqa:47.0,f:"Gemma"},
  {n:"Gemma-2-27B", N:2.7e10,tqa:50.0,f:"Gemma"},     {n:"Mistral-8x7B",N:4.68e10,tqa:46.0,f:"Mistral"},
];
const FC={Pythia:"#3b82f6","Llama-1":"#6366f1","Llama-2":"#a855f7",OLMo:"#f97316",Phi:"#ef4444",
          Mistral:"#eab308","Llama-3":"#10b981",Gemma:"#ec4899",MPT:"#64748b",Falcon:"#065f46"};

const FRONTIER=[
  {n:"Sonnet 4.5",   swe:77.2,gpqa:83.4,h:-2.6, fam:"Anthropic"},
  {n:"Sonnet 4.6",   swe:79.6,gpqa:74.1,h:-13.9,fam:"Anthropic"},
  {n:"Opus 4.6",     swe:80.8,gpqa:91.3,h:2.2,  fam:"Anthropic"},
  {n:"GPT-5.2 Pro",  swe:80.0,gpqa:93.2,h:4.0,  fam:"OpenAI"},
  {n:"Gemini 3 Flash",swe:78.0,gpqa:90.4,h:4.9, fam:"Google"},
  {n:"Gemini 3 Pro", swe:76.2,gpqa:91.9,h:7.4,  fam:"Google"},
  {n:"Gemini 3.1 Pro",swe:80.6,gpqa:94.3,h:5.4, fam:"Google"},
  {n:"DeepSeek V3.2",swe:74.4,gpqa:79.9,h:-3.8, fam:"DeepSeek"},
  {n:"Kimi K2.5",    swe:80.2,gpqa:85.2,h:-4.0, fam:"Kimi"},
  {n:"Qwen3.5-72B",  swe:73.4,gpqa:83.7,h:2.6,  fam:"Alibaba"},
];
const FFC={Anthropic:"#CC785C",OpenAI:"#10a37f",Google:"#4285f4",
           DeepSeek:"#1e40af",Kimi:"#7c3aed",Alibaba:"#f97316"};

const H_DATA=[
  {n:"Phi-4",          lab:"Microsoft", h:23.0,  note:"Curated/synthetic data"},
  {n:"Phi-3.5-MoE",    lab:"Microsoft", h:15.3,  note:"Curated"},
  {n:"DeepSeek-V3",    lab:"DeepSeek",  h:15.1,  note:"R1 distillation"},
  {n:"Phi-3-mini",     lab:"Microsoft", h:11.6,  note:"Curated"},
  {n:"Llama-3.1-405B", lab:"Meta",      h:5.1,   note:"Scale helps"},
  {n:"Mistral-7B",     lab:"Mistral",   h:1.7,   note:"Instruction tuning"},
  {n:"Llama-2-70B",    lab:"Meta",      h:1.6,   note:"RLHF baseline"},
  {n:"Llama-3-70B",    lab:"Meta",      h:1.3,   note:""},
  {n:"Llama-1-65B",    lab:"Meta",      h:-0.2,  note:"Pre-RLHF era"},
  {n:"Falcon-40B",     lab:"Tii",       h:-2.7,  note:"Minimal alignment"},
];

/* ── HELPERS ──────────────────────────────────────────── */
const Bx=(ex)=>({background:"#161b22",border:"1px solid #30363d",borderRadius:8,padding:"16px 18px",...ex});
const BL=(c)=>({borderLeft:`3px solid ${c}`});
const MN=(ex)=>({style:{fontFamily:"'IBM Plex Mono',monospace",...ex}});
const DIM=(ex)=>({style:{fontSize:11,color:"#8b949e",letterSpacing:1,marginBottom:6,fontWeight:600,textTransform:"uppercase",...ex}});

/* ── CANVAS: PHASE DIAGRAM ────────────────────────────── */
function PhaseChart({uN,uT}){
  const ref=useRef(null);
  const draw=()=>{
    const cv=ref.current; if(!cv)return;
    const dpr=window.devicePixelRatio||1;
    const W=cv.parentElement.clientWidth||580, H=280;
    cv.width=W*dpr; cv.height=H*dpr;
    const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
    const p={l:44,r:14,t:16,b:44};
    const lMn=7.8,lMx=11.5,tMn=26,tMx=82;
    const X=l=>p.l+(l-lMn)/(lMx-lMn)*(W-p.l-p.r);
    const Y=t=>p.t+(tMx-t)/(tMx-tMn)*(H-p.t-p.b);
    ctx.clearRect(0,0,W,H);
    const ncX=X(Math.log10(NC));
    ctx.fillStyle="rgba(220,38,38,0.045)"; ctx.fillRect(p.l,p.t,ncX-p.l,H-p.t-p.b);
    ctx.fillStyle="rgba(16,185,129,0.045)"; ctx.fillRect(ncX,p.t,W-p.r-ncX,H-p.t-p.b);
    ctx.strokeStyle="#30363d"; ctx.lineWidth=1.5; ctx.setLineDash([5,4]);
    ctx.beginPath(); ctx.moveTo(ncX,p.t); ctx.lineTo(ncX,H-p.b); ctx.stroke(); ctx.setLineDash([]);
    const nc2X=X(Math.log10(11.3e9));
    ctx.strokeStyle="#30363d"; ctx.lineWidth=1; ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(nc2X,p.t); ctx.lineTo(nc2X,H-p.b); ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle="#8b949e"; ctx.font="9px monospace"; ctx.textAlign="center";
    ctx.fillText("Nₒ₂",nc2X,p.t+10);
    ctx.strokeStyle="#30363d"; ctx.lineWidth=2; ctx.setLineDash([5,3]);
    ctx.beginPath();
    for(let l=lMn,first=true;l<=lMx;l+=0.04){
      const py=Y(UNIV(l)); first?ctx.moveTo(X(l),py):ctx.lineTo(X(l),py); first=false;
    }
    ctx.stroke(); ctx.setLineDash([]);
    ctx.strokeStyle="#f87171"; ctx.lineWidth=1.5; ctx.setLineDash([3,3]);
    ctx.beginPath();
    for(let l=8.4,first=true;l<=11.2;l+=0.04){
      const py=Y(UNIV(l)+20); first?ctx.moveTo(X(l),py):ctx.lineTo(X(l),py); first=false;
    }
    ctx.stroke(); ctx.setLineDash([]);
    MODELS.forEach(m=>{
      const l=Math.log10(m.N); if(l<lMn||l>lMx)return;
      ctx.beginPath(); ctx.arc(X(l),Y(m.tqa),4.5,0,Math.PI*2);
      ctx.fillStyle=FC[m.f]||"#888"; ctx.fill();
    });
    const olmo=MODELS.find(m=>m.n==="OLMo-7B");
    if(olmo){ const px=X(Math.log10(olmo.N)),py=Y(olmo.tqa);
      ctx.beginPath(); ctx.arc(px,py,8,0,Math.PI*2);
      ctx.strokeStyle="#f97316"; ctx.lineWidth=2; ctx.stroke();
      ctx.fillStyle="#f97316"; ctx.font="bold 8px monospace"; ctx.textAlign="left";
      ctx.fillText("γ=0",px+10,py+4);
    }
    if(uN&&uT){ const l=Math.log10(uN);
      if(l>=lMn&&l<=lMx){
        ctx.beginPath(); ctx.arc(X(l),Y(uT),8,0,Math.PI*2);
        ctx.fillStyle="#0d1117"; ctx.strokeStyle="#c4b5fd"; ctx.lineWidth=2.5; ctx.fill(); ctx.stroke();
        ctx.fillStyle="#c4b5fd"; ctx.font="bold 8px monospace"; ctx.textAlign="left";
        ctx.fillText("YOU",X(l)+10,Y(uT)+4);
      }
    }
    ctx.strokeStyle="#30363d"; ctx.lineWidth=1; ctx.strokeRect(p.l,p.t,W-p.l-p.r,H-p.t-p.b);
    ctx.fillStyle="#8b949e"; ctx.font="10px monospace"; ctx.textAlign="center";
    [{N:1e8,l:"100M"},{N:1e9,l:"1B"},{N:1e10,l:"10B"},{N:1e11,l:"100B"}].forEach(({N:n,l})=>{
      const ln=Math.log10(n); if(ln<lMn||ln>lMx)return; ctx.fillText(l,X(ln),H-p.b+14);
    });
    ctx.textAlign="right";
    [30,40,50,60,70,80].forEach(v=>{if(v>=tMn&&v<=tMx)ctx.fillText(v,p.l-5,Y(v)+4);});
    ctx.textAlign="center"; ctx.fillStyle="#8b949e"; ctx.font="9px monospace";
    ctx.fillText("model size (parameters)",W/2,H-3);
    ctx.save(); ctx.translate(11,H/2); ctx.rotate(-Math.PI/2); ctx.fillText("TruthfulQA (%)",0,0); ctx.restore();
    ctx.font="bold 8px monospace"; ctx.textAlign="left";
    ctx.fillStyle="rgba(248,113,113,0.5)"; ctx.fillText("← tax",p.l+6,p.t+13);
    ctx.fillStyle="rgba(110,231,183,0.5)"; ctx.fillText("bonus →",ncX+6,p.t+13);
  };
  useEffect(()=>{draw();window.addEventListener("resize",draw);return()=>window.removeEventListener("resize",draw);},[uN,uT]);
  return React.createElement("canvas",{ref,style:{width:"100%",height:280,display:"block"}});
}

/* ── CANVAS: FRONTIER SCATTER ─────────────────────────── */
function FrontierChart(){
  const ref=useRef(null);
  const draw=()=>{
    const cv=ref.current; if(!cv)return;
    const dpr=window.devicePixelRatio||1;
    const W=cv.parentElement.clientWidth||500, H=240;
    cv.width=W*dpr; cv.height=H*dpr;
    const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
    const p={l:46,r:16,t:16,b:44};
    const sMin=72,sMax=82,gMin=68,gMax=97;
    const X=s=>p.l+(s-sMin)/(sMax-sMin)*(W-p.l-p.r);
    const Y=g=>p.t+(gMax-g)/(gMax-gMin)*(H-p.t-p.b);
    ctx.clearRect(0,0,W,H);
    const sl=(93.2-83.4)/(80-77.2), ic=83.4-sl*77.2;
    ctx.strokeStyle="#30363d"; ctx.lineWidth=1.5; ctx.setLineDash([4,3]);
    ctx.beginPath(); ctx.moveTo(X(sMin),Y(sl*sMin+ic)); ctx.lineTo(X(sMax),Y(sl*sMax+ic)); ctx.stroke(); ctx.setLineDash([]);
    FRONTIER.forEach(m=>{
      const px=X(m.swe), py=Y(m.gpqa);
      ctx.beginPath(); ctx.arc(px,py,5.5,0,Math.PI*2);
      ctx.fillStyle=FFC[m.fam]||"#888";
      if(m.n==="Sonnet 4.6"){ctx.strokeStyle="#f87171";ctx.lineWidth=2;ctx.fill();ctx.stroke();}
      else ctx.fill();
      if(m.n==="Sonnet 4.6"||m.n==="Opus 4.6"){
        const exp=sl*m.swe+ic, ac=m.n==="Sonnet 4.6"?"#f87171":"#6ee7b7";
        ctx.strokeStyle=ac; ctx.lineWidth=1.5;
        ctx.beginPath(); ctx.moveTo(px,Y(exp)); ctx.lineTo(px,py); ctx.stroke();
        ctx.fillStyle=ac; ctx.font="bold 8px monospace"; ctx.textAlign="left";
        ctx.fillText(m.n==="Sonnet 4.6"?"h=−14":"h=+2",px+7,py+(m.n==="Sonnet 4.6"?5:-4));
      }
      if(["GPT-5.2 Pro","Gemini 3.1 Pro","Opus 4.6","Sonnet 4.6"].includes(m.n)){
        ctx.fillStyle="#8b949e"; ctx.font="9px monospace"; ctx.textAlign="left";
        ctx.fillText(m.n,px+7,py-3);
      }
    });
    ctx.strokeStyle="#30363d"; ctx.lineWidth=1; ctx.strokeRect(p.l,p.t,W-p.l-p.r,H-p.t-p.b);
    ctx.fillStyle="#8b949e"; ctx.font="10px monospace"; ctx.textAlign="center";
    [74,76,78,80,82].forEach(v=>ctx.fillText(v+"",X(v),H-p.b+14));
    ctx.textAlign="right";
    [70,80,90].forEach(v=>{if(v>=gMin&&v<=gMax)ctx.fillText(v,p.l-5,Y(v)+4);});
    ctx.textAlign="center"; ctx.fillStyle="#8b949e"; ctx.font="9px monospace";
    ctx.fillText("SWE-bench Verified (%)",W/2,H-3);
    ctx.save(); ctx.translate(11,H/2); ctx.rotate(-Math.PI/2); ctx.fillText("GPQA Diamond (%)",0,0); ctx.restore();
  };
  useEffect(()=>{draw();window.addEventListener("resize",draw);return()=>window.removeEventListener("resize",draw);},[]);
  return React.createElement("canvas",{ref,style:{width:"100%",height:240,display:"block"}});
}

/* ── CANVAS: THERMODYNAMIC OBSERVABLES ─────────────────── */
function ThermoChart(){
  const ref=useRef(null);
  const draw=()=>{
    const cv=ref.current; if(!cv)return;
    const dpr=window.devicePixelRatio||1;
    const W=cv.parentElement.clientWidth||560, H=230;
    cv.width=W*dpr; cv.height=H*dpr;
    const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);
    const p={l:14,r:14,t:24,b:30};
    const panels=4;
    const pw=(W-p.l-p.r-panels*4)/panels;
    const lMn=8.0, lMx=11.2;
    const Ls=[];
    for(let l=lMn;l<=lMx;l+=0.05) Ls.push(l);
    const datasets=[
      {title:"γ₁₂(N)  running coupling",
       c:"#c4b5fd", vals:Ls.map(l=>g12(Math.pow(10,l))), yMn:-1.8, yMx:1.8,
       zeroLine:true, ncLine:true},
      {title:"∂γ₁₂/∂logN  (susceptibility)",
       c:"#fb923c", vals:Ls.map((_,i,a)=>i===0?GA:(a[i]-a[i-1])*GA/0.05).map(()=>GA),
       special:"chi", yMn:0.4, yMx:2.0, ncLine:true},
      {title:"d_eff(N)  PCA dimensionality",
       c:"#6ee7b7", vals:Ls.map(l=>Math.max(1,-0.27*l+3.9)), yMn:0.8, yMx:2.2,
       zeroLine:false, ncLine:true, nc2Line:true},
      {title:"λ₂(N)  soft eigenvalue",
       c:"#60a5fa", vals:Ls.map(l=>Math.max(0.05,1.06*Math.pow(10,-(l-8.61)*0.72))), yMn:0, yMx:1.2,
       zeroLine:false, ncLine:true},
    ];
    datasets.forEach((d,pi)=>{
      const x0=p.l+pi*(pw+4);
      const X=l=>x0+(l-lMn)/(lMx-lMn)*pw;
      const Y=v=>p.t+(d.yMx-v)/(d.yMx-d.yMn)*(H-p.t-p.b);
      ctx.fillStyle="#161b22"; ctx.fillRect(x0,p.t,pw,H-p.t-p.b);
      const ncX=X(Math.log10(NC));
      ctx.fillStyle="rgba(220,38,38,0.04)"; ctx.fillRect(x0,p.t,ncX-x0,H-p.t-p.b);
      ctx.fillStyle="rgba(16,185,129,0.04)"; ctx.fillRect(ncX,p.t,x0+pw-ncX,H-p.t-p.b);
      if(d.zeroLine){
        const zy=Y(0);
        ctx.strokeStyle="#30363d"; ctx.lineWidth=1; ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(x0,zy); ctx.lineTo(x0+pw,zy); ctx.stroke(); ctx.setLineDash([]);
      }
      if(d.ncLine){
        ctx.strokeStyle="#fbbf2444"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(ncX,p.t); ctx.lineTo(ncX,H-p.b); ctx.stroke();
      }
      if(d.nc2Line){
        const nc2X=X(Math.log10(11.3e9));
        ctx.strokeStyle="#6ee7b744"; ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(nc2X,p.t); ctx.lineTo(nc2X,H-p.b); ctx.stroke();
      }
      let vals=d.vals;
      if(d.special==="chi"){
        const lNc=Math.log10(NC);
        vals=Ls.map(l=>GA+1.0*Math.exp(-Math.pow((l-lNc)/0.25,2)));
      }
      ctx.strokeStyle=d.c; ctx.lineWidth=2;
      ctx.beginPath();
      vals.forEach((v,i)=>{
        const px=X(Ls[i]), py=Y(v);
        i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
      });
      ctx.stroke();
      ctx.fillStyle="#8b949e"; ctx.font="9px monospace"; ctx.textAlign="right";
      [d.yMn,0.5*(d.yMn+d.yMx),d.yMx].forEach(v=>{
        if(v>=d.yMn&&v<=d.yMx) ctx.fillText(v.toFixed(1),x0+pw-2,Y(v)+3);
      });
      ctx.fillStyle=d.c; ctx.font="bold 9px monospace"; ctx.textAlign="left";
      ctx.fillText(d.title,x0+3,p.t-6);
      ctx.strokeStyle="#30363d"; ctx.lineWidth=1; ctx.strokeRect(x0,p.t,pw,H-p.t-p.b);
    });
  };
  useEffect(()=>{draw();window.addEventListener("resize",draw);return()=>window.removeEventListener("resize",draw);},[]);
  return React.createElement("canvas",{ref,style:{width:"100%",height:230,display:"block"}});
}

/* ── CANVAS: GROUP/SYMMETRY FLOW ────────────────────────── */
function SymmetryChart(){
  const ref=useRef(null);
  const draw=()=>{
    const cv=ref.current; if(!cv)return;
    const dpr=window.devicePixelRatio||1;
    const W=cv.parentElement.clientWidth||560, H=175;
    cv.width=W*dpr; cv.height=H*dpr;
    const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);
    const stages=[
      {x:0.09,sym:"O(2)×ℤ₂",scale:"<1B",c:"#8b949e",top:"Full symmetry\nno broken generator",bot:"tax/bonus degenerate"},
      {x:0.32,sym:"ℤ₂ breaks",scale:"Nₒ 3.5B",c:"#fbbf24",top:"discrete Z₂ breaks\nγ₁₂ sign flips",bot:"OLMo γ=0 = domain wall",arrow:"1st order\n(discrete)"},
      {x:0.55,sym:"O(2) free",scale:"3.5–11B",c:"#c4b5fd",top:"θ oscillates\nU(1) not locked",bot:"bonus but unstable"},
      {x:0.77,sym:"U(1) locks",scale:"Nₒ₂ 11B",c:"#6ee7b7",top:"θ→38.8° fixed\nTRSB onset",bot:"Im(ψ₁*ψ₂)≠0\nirreversible",arrow:"2nd order\n(continuous)"},
      {x:0.94,sym:"ℤ_d",scale:">11B",c:"#34d399",top:"Class D  Z₂=1\ntopological",bot:"Majorana @ wall\n9/9 labs confirm"},
    ];
    const midY=H*0.48;
    ctx.strokeStyle="#30363d"; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(W*0.02,midY); ctx.lineTo(W*0.98,midY); ctx.stroke();
    stages.forEach((s,i)=>{
      const cx=W*s.x;
      if(i<stages.length-1&&stages[i+1].arrow){
        const nx=W*stages[i+1].x;
        ctx.strokeStyle="#30363d"; ctx.lineWidth=1; ctx.setLineDash([3,3]);
        ctx.beginPath(); ctx.moveTo(cx+22,midY); ctx.lineTo(nx-22,midY); ctx.stroke(); ctx.setLineDash([]);
        const mx=(cx+22+nx-22)/2;
        ctx.fillStyle="#8b949e"; ctx.font="8px monospace"; ctx.textAlign="center";
        stages[i+1].arrow.split("\n").forEach((ln,li)=>ctx.fillText(ln,mx,midY-8+li*9));
      }
      ctx.beginPath(); ctx.arc(cx,midY,17,0,Math.PI*2);
      ctx.fillStyle="#0d1117"; ctx.strokeStyle=s.c; ctx.lineWidth=2;
      ctx.fill(); ctx.stroke();
      ctx.fillStyle=s.c; ctx.font="bold 8px monospace"; ctx.textAlign="center";
      s.sym.split(" ").forEach((ln,li)=>ctx.fillText(ln,cx,midY-2+li*9));
      ctx.fillStyle="#8b949e"; ctx.font="9px monospace";
      ctx.fillText(s.scale,cx,midY+26);
      ctx.fillStyle=s.c; ctx.font="8px monospace";
      s.top.split("\n").forEach((ln,li)=>ctx.fillText(ln,cx,midY-24-li*9));
    });
  };
  useEffect(()=>{draw();window.addEventListener("resize",draw);return()=>window.removeEventListener("resize",draw);},[]);
  return React.createElement("canvas",{ref,style:{width:"100%",height:175,display:"block"}});
}
